- name: "Valid List Parameter Parsing"
  description: "Test that a valid list parameter is correctly parsed"
  sections:
    - name: "testLayer"
      definitions:
        - name: "colors"
          type: "stringList"
          required: true
  values: []
  queryParameters:
    - name: "colors[]"
      value: "red"
    - name: "colors[]"
      value: "green"
    - name: "colors[]"
      value: "blue"
  expectedSections:
    - name: "testLayer"
      values:
        colors: ["red", "green", "blue"]
  expectedError: false

- name: "Invalid List Parameter Parsing"
  description: "Test that an invalid list parameter value results in an appropriate error."
  sections:
    - name: "testLayer"
      definitions:
        - name: "numbers"
          type: "intList"
          required: true
  values: []
  queryParameters:
    - name: "numbers[]"
      value: "one"
    - name: "numbers[]"
      value: "two"
    - name: "numbers[]"
      value: "three"
  expectedSections: []
  expectedError: true

- name: "Missing Required List Parameter"
  description: "Test that a missing required list parameter results in an error."
  sections:
    - name: "testLayer"
      definitions:
        - name: "ids"
          type: "intList"
          required: true
  values: []
  expectedSections: []
  expectedError: true

- name: "Test with non-list parameter marked as list"
  description: "Confirm that an error is returned when a non-list parameter is incorrectly marked as a list."
  sections:
    - name: "layer1"
      definitions:
        - name: "nonListParam"
          type: "string"
          required: true
  values: []
  queryParameters:
    - name: "nonListParam[]"
      value: "incorrectListFormat"
  expectedSections: []
  expectedError: true

- name: "Test with valid non-list parameter "
  description: "Ensure that a valid non-list parameter (e.g., 'param=value') is parsed correctly."
  sections:
    - name: "layer1"
      definitions:
        - name: "validParam"
          type: "string"
          required: true
  values: []
  queryParameters:
    - name: "validParam"
      value: "validValue"
  expectedSections:
    - name: "layer1"
      values:
        validParam: "validValue"
  expectedError: false

- name: "Test with valid unicode non-list parameter with special characters"
  description: "Ensure that a valid non-list parameter with unicode characters is parsed correctly."
  sections:
    - name: "layer1"
      definitions:
        - name: "validParam"
          type: "string"
          required: true
  values: []
  queryParameters:
    - name: "validParam"
      value: "validValue-👍"
  expectedSections:
    - name: "layer1"
      values:
        validParam: "validValue-👍"
